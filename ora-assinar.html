<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORA - Assinar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#000;color:#e8e0d0;font-family:'Courier New',monospace}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;min-height:100vh}
.logo{font-size:11px;letter-spacing:6px;color:#444;text-transform:uppercase;margin-bottom:32px;padding-top:8px}
.card{width:100%;max-width:480px;border:1px solid #1a1a1a;padding:24px;margin-bottom:16px}
.card-title{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:20px}
.prop-id{font-size:10px;color:#555;letter-spacing:1px;margin-bottom:8px}
.prop-desc{font-size:14px;color:#c8a882;line-height:1.6;margin-bottom:16px;min-height:40px}
.prop-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.meta-item{font-size:10px;color:#555;letter-spacing:1px}
.meta-val{color:#888;margin-top:2px}
.badge{display:inline-block;padding:3px 10px;font-size:10px;letter-spacing:2px;border-radius:2px;margin-bottom:20px}
.badge-pendente{background:#1a1400;color:#c8a040;border:1px solid #3a2800}
.badge-confirmado{background:#001a0d;color:#40c870;border:1px solid #005020}
.badge-rejeitado{background:#1a0000;color:#c84040;border:1px solid #500000}
.divider{border:none;border-top:1px solid #111;margin:16px 0}
.btn{width:100%;padding:14px;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:10px;border-radius:2px}
.btn-confirm{background:transparent;border:1px solid #c8a882;color:#c8a882}
.btn-confirm:hover{background:#c8a88220}
.btn-confirm:active{background:#c8a88240}
.btn-reject{background:transparent;border:1px solid #444;color:#666}
.btn-reject:hover{border-color:#888;color:#888}
.btn-reject:active{background:#ffffff10}
.status{font-size:11px;color:#555;text-align:center;padding:12px;letter-spacing:1px;min-height:40px;line-height:1.6}
.status-ok{color:#40c870}
.status-err{color:#c84040}
.wallet-addr{font-size:9px;color:#2a2a2a;text-align:center;margin-top:8px;letter-spacing:1px;word-break:break-all}
.empty{text-align:center;color:#333;font-size:12px;padding:40px 0;letter-spacing:2px}
.sig-box{background:#0a0a0a;border:1px solid #111;padding:12px;margin-top:12px;font-size:9px;color:#444;word-break:break-all;line-height:1.6;display:none}
.sig-box.show{display:block}
.nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.nav-btn{padding:6px 14px;font-size:9px;letter-spacing:2px;background:transparent;border:1px solid #1a1a1a;color:#444;cursor:pointer;font-family:inherit}
.nav-btn.active{border-color:#c8a882;color:#c8a882}
</style>
</head>
<body>

<div class="logo">ORA &mdash; Assinar</div>

<div style="width:100%;max-width:480px" id="root">
  <div class="empty">a carregar...</div>
</div>

<div class="wallet-addr" id="wallet-display"></div>

<script>
const SB = "https://ywabnlhkmhbyewqhbsjm.supabase.co";
const AK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3YWJubGhrbWhieWV3cWhic2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwOTUyOTYsImV4cCI6MjA1ODY3MTI5Nn0.aHsZ6R37CJ7monPbXGh1YsMFKFqxnJhOgCIJOyZXspI";
const EXPECTED_WALLET = "0xfed69e8ee87a1f0fbbf8409ab654fc51832cdee5";

let proposals = [];
let currentIdx = 0;
let connectedWallet = null;

// --- ASCII-safe message builder ---
function buildMessage(p) {
  const id = (p.id || "").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 40);
  const desc = (p.descricao || p.tipo || "proposta")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")  // remove diacritics
    .replace(/[^a-zA-Z0-9 .,!?:;_\-]/g, "")
    .slice(0, 80);
  const ts = Math.floor(Date.now() / 1000);
  return "ORA AUTHORIZE " + id + " | " + desc + " | ts:" + ts;
}

async function sbGet(path) {
  const r = await fetch(SB + path, {
    headers: { apikey: AK, Authorization: "Bearer " + AK }
  });
  return r.json();
}

async function sbPatch(table, id, body) {
  return fetch(SB + "/rest/v1/" + table + "?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: AK,
      Authorization: "Bearer " + AK,
      "Content-Type": "application/json",
      Prefer: "return=minimal"
    },
    body: JSON.stringify(body)
  });
}

function setStatus(msg, type) {
  const el = document.getElementById("status-msg");
  if (!el) return;
  el.textContent = msg;
  el.className = "status" + (type ? " status-" + type : "");
}

async function loadProposals() {
  try {
    const params = new URLSearchParams(window.location.search);
    const foco = params.get("foco");
    let path = "/rest/v1/ora_operacoes_propostas?select=*&order=created_at.desc&limit=20";
    const data = await sbGet(path);
    proposals = Array.isArray(data) ? data : [];
    if (foco) {
      const idx = proposals.findIndex(function(p) { return p.id === foco; });
      if (idx >= 0) currentIdx = idx;
    }
    render();
  } catch(e) {
    document.getElementById("root").innerHTML = "<div class=\"empty\">erro: " + e.message + "</div>";
  }
}

function render() {
  const root = document.getElementById("root");
  if (!proposals.length) {
    root.innerHTML = "<div class=\"empty\">sem propostas</div>";
    return;
  }

  const p = proposals[currentIdx];
  if (!p) return;

  const badgeCls = p.estado === "pendente" ? "badge-pendente" : p.estado === "confirmado" ? "badge-confirmado" : "badge-rejeitado";
  const isPending = p.estado === "pendente";

  const nav = proposals.length > 1
    ? "<div class=\"nav\">" +
        (currentIdx > 0 ? "<button class=\"nav-btn\" onclick=\"go(-1)\">&larr; anterior</button>" : "") +
        "<span style=\"font-size:10px;color:#444;padding:6px 8px\">" + (currentIdx+1) + "/" + proposals.length + "</span>" +
        (currentIdx < proposals.length-1 ? "<button class=\"nav-btn\" onclick=\"go(1)\">seguinte &rarr;</button>" : "") +
      "</div>"
    : "";

  root.innerHTML =
    nav +
    "<div class=\"card\">" +
      "<div class=\"card-title\">Proposta de Autorizacao</div>" +
      "<div class=\"prop-id\">#" + (p.id || "").slice(0,20) + "</div>" +
      "<div class=\"prop-desc\">" + (p.descricao || p.tipo || "&mdash;") + "</div>" +
      "<div class=\"prop-meta\">" +
        "<div class=\"meta-item\">TIPO<div class=\"meta-val\">" + (p.tipo || "&mdash;") + "</div></div>" +
        "<div class=\"meta-item\">PRIORIDADE<div class=\"meta-val\">" + (p.prioridade || "&mdash;") + "</div></div>" +
        (p.value_wei ? "<div class=\"meta-item\">VALOR<div class=\"meta-val\">" + p.value_wei + " wei</div></div>" : "") +
      "</div>" +
      "<span class=\"badge " + badgeCls + "\">" + (p.estado || "?") + "</span>" +
      "<hr class=\"divider\">" +
      (isPending
        ? "<button class=\"btn btn-confirm\" onclick=\"sign(true)\">Confirmar e Assinar</button>" +
          "<button class=\"btn btn-reject\" onclick=\"sign(false)\">Rejeitar</button>"
        : "<div style=\"font-size:11px;color:#555;text-align:center;padding:8px;letter-spacing:1px\">proposta ja " + p.estado + "</div>"
      ) +
      "<div class=\"status\" id=\"status-msg\"></div>" +
      "<div class=\"sig-box\" id=\"sig-box\"></div>" +
    "</div>";
}

function go(dir) {
  currentIdx = Math.max(0, Math.min(proposals.length - 1, currentIdx + dir));
  render();
}

async function connectWallet() {
  if (typeof window.ethereum === "undefined") {
    alert("Carteira nao detectada. Abre numa wallet browser (MetaMask, Base Wallet, Rainbow).");
    return null;
  }
  try {
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    const addr = accounts[0].toLowerCase();
    connectedWallet = addr;
    document.getElementById("wallet-display").textContent = addr;
    if (addr !== EXPECTED_WALLET) {
      setStatus("AVISO: carteira diferente da esperada", "err");
    }
    return addr;
  } catch(e) {
    setStatus("Carteira recusada: " + e.message, "err");
    return null;
  }
}

async function sign(confirm) {
  const p = proposals[currentIdx];
  if (!p) return;

  setStatus("A ligar carteira...");

  const wallet = connectedWallet || await connectWallet();
  if (!wallet) return;

  const msg = buildMessage(p);

  setStatus("A assinar mensagem...");

  let sig;
  try {
    // EIP-191 personal_sign - msg como hex para compatibilidade Base Wallet
    const msgHex = "0x" + Array.from(new TextEncoder().encode(msg))
      .map(function(b) { return b.toString(16).padStart(2, "0"); })
      .join("");

    try {
      sig = await window.ethereum.request({
        method: "personal_sign",
        params: [msgHex, wallet]
      });
    } catch(hexErr) {
      // fallback: string pura
      sig = await window.ethereum.request({
        method: "personal_sign",
        params: [msg, wallet]
      });
    }
  } catch(e) {
    setStatus("Assinatura cancelada: " + e.message, "err");
    return;
  }

  setStatus("A registar...");

  try {
    const estado = confirm ? "confirmado" : "rejeitado";
    const r = await sbPatch("ora_operacoes_propostas", p.id, {
      estado: estado,
      assinatura: sig,
      mensagem_assinada: msg,
      wallet: wallet,
      updated_at: new Date().toISOString()
    });

    if (r.ok) {
      setStatus(estado.toUpperCase() + " - assinatura registada", "ok");
      const sb = document.getElementById("sig-box");
      if (sb) {
        sb.textContent = "MSG: " + msg + "\nSIG: " + sig.slice(0,20) + "...";
        sb.className = "sig-box show";
      }
      proposals[currentIdx].estado = estado;
      setTimeout(render, 1500);
    } else {
      const err = await r.text();
      setStatus("Erro ao guardar: " + err, "err");
    }
  } catch(e) {
    setStatus("Erro: " + e.message, "err");
  }
}

loadProposals();
</script>
</body>
</html>
